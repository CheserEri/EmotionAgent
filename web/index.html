<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }

    /* 3D 画布 */
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    canvas { display: block; }

    /* 聊天面板 */
    #chat-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 380px;
      background: rgba(10, 10, 30, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      z-index: 10;
      border-left: 1px solid rgba(255,255,255,0.1);
    }

    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 16px;
      font-weight: bold;
      color: #8be9fd;
    }

    #status-bar {
      padding: 8px 20px;
      font-size: 12px;
      color: #bd93f9;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      min-height: 28px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-user {
      align-self: flex-end;
      background: #44475a;
      color: #f8f8f2;
    }
    .msg-ai {
      align-self: flex-start;
      background: rgba(139, 233, 253, 0.1);
      border: 1px solid rgba(139, 233, 253, 0.2);
      color: #f8f8f2;
    }
    .msg-system {
      align-self: center;
      background: transparent;
      color: #6272a4;
      font-size: 12px;
      padding: 4px 0;
    }

    #input-area {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      color: #f8f8f2;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #msg-input:focus {
      border-color: #8be9fd;
    }
    #msg-input::placeholder { color: #6272a4; }

    #send-btn {
      background: #8be9fd;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #50c8e8; }
    #send-btn:disabled {
      background: #44475a;
      color: #6272a4;
      cursor: not-allowed;
    }

    /* 加载提示 */
    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 30, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 100;
      gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #44475a;
      border-top-color: #8be9fd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: #8be9fd; font-size: 14px; }
    #loading-progress { color: #6272a4; font-size: 12px; }

    /* 错误提示 */
    #error-box {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      background: #ff5555;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 200;
      display: none;
      max-width: 500px;
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="chat-panel">
  <div id="chat-header">Emotion Agent</div>
  <div id="status-bar">等待模型加载...</div>
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="msg-input" placeholder="输入消息..." disabled>
    <button id="send-btn" disabled>发送</button>
  </div>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">正在加载模型...</div>
  <div id="loading-progress"></div>
</div>

<div id="error-box"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="js/main.js"></script>

</body>
</html>
