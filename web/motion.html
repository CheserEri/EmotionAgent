<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Agent - Motion Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }

    /* 3D 画布 */
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    canvas { display: block; }

    /* 控制面板 */
    #control-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 380px;
      background: rgba(10, 10, 30, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      z-index: 10;
      border-left: 1px solid rgba(255,255,255,0.1);
    }

    #panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 16px;
      font-weight: bold;
      color: #8be9fd;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #panel-header .icon { font-size: 20px; }

    /* 状态栏 */
    #status-bar {
      padding: 10px 20px;
      font-size: 12px;
      color: #bd93f9;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff5555;
    }
    .status-dot.connected { background: #50fa7b; }
    .status-dot.playing { background: #f1fa8c; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* 内容区域 */
    #panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 分区标题 */
    .section-title {
      font-size: 13px;
      font-weight: bold;
      color: #8be9fd;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* 输入组 */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="number"] {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      color: #f8f8f2;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #8be9fd; }
    input::placeholder { color: #6272a4; }

    /* 按钮 */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary {
      background: #8be9fd;
      color: #1a1a2e;
    }
    .btn-primary:hover { background: #50c8e8; }
    .btn-primary:disabled {
      background: #44475a;
      color: #6272a4;
      cursor: not-allowed;
    }

    .btn-danger {
      background: #ff5555;
      color: white;
    }
    .btn-danger:hover { background: #ff3333; }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #f8f8f2;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }

    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn-group .btn { flex: 1; }

    /* 进度条 */
    #progress-container {
      display: none;
    }
    #progress-container.active { display: block; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8be9fd, #bd93f9);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }

    #progress-text {
      font-size: 12px;
      color: #6272a4;
      margin-top: 4px;
    }

    /* 统计信息 */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-item {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat-label {
      font-size: 11px;
      color: #6272a4;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #8be9fd;
    }

    /* 视频预览 */
    #video-preview {
      display: none;
      width: 100%;
      border-radius: 8px;
      background: #000;
      max-height: 200px;
      object-fit: contain;
    }
    #video-preview.active { display: block; }

    /* 日志区域 */
    #log-area {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 12px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
      color: #6272a4;
      max-height: 150px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .log-info { color: #8be9fd; }
    .log-success { color: #50fa7b; }
    .log-warn { color: #f1fa8c; }
    .log-error { color: #ff5555; }

    /* 加载提示 */
    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 30, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 100;
      gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #44475a;
      border-top-color: #8be9fd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: #8be9fd; font-size: 14px; }
    #loading-progress { color: #6272a4; font-size: 12px; }

    /* 错误提示 */
    #error-box {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      background: #ff5555;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 200;
      display: none;
      max-width: 500px;
    }

    /* 分隔线 */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* 文件选择 */
    .file-input-wrapper {
      position: relative;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .file-input-display {
      background: rgba(255,255,255,0.08);
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: #6272a4;
      font-size: 13px;
      transition: all 0.2s;
    }
    .file-input-wrapper:hover .file-input-display {
      border-color: #8be9fd;
      color: #8be9fd;
    }
    .file-input-display .icon { font-size: 24px; margin-bottom: 8px; }

    /* 快捷链接 */
    .quick-links {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .quick-link {
      font-size: 12px;
      color: #bd93f9;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(189,147,249,0.1);
      transition: background 0.2s;
    }
    .quick-link:hover { background: rgba(189,147,249,0.2); }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="control-panel">
  <div id="panel-header">
    <span class="icon">🎭</span>
    Motion Capture
  </div>

  <div id="status-bar">
    <div id="ws-status">
      <div class="status-dot" id="ws-dot"></div>
      <span id="ws-text">未连接</span>
    </div>
    <span id="fps-display">-- FPS</span>
  </div>

  <div id="panel-content">
    <!-- 视频输入 -->
    <div>
      <div class="section-title">📹 视频输入</div>
      <div class="input-group">
        <div class="file-input-wrapper">
          <div class="file-input-display">
            <div class="icon">📁</div>
            <div>点击选择视频文件或拖放到此处</div>
            <div style="font-size:11px; margin-top:4px;">支持 mp4, avi, mov, mkv</div>
          </div>
          <input type="file" id="video-file-input" accept="video/*">
        </div>
        <video id="video-preview" controls></video>
        <div class="input-row">
          <input type="text" id="video-path-input" placeholder="或输入服务器端视频路径...">
        </div>
        <div class="input-row">
          <input type="number" id="start-frame" placeholder="起始帧" value="0" min="0" style="width:80px;">
          <input type="number" id="max-frames" placeholder="最大帧数(可选)" min="1">
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="btn-process-video" disabled>
            ▶ 开始处理
          </button>
          <button class="btn btn-danger" id="btn-stop" disabled>
            ⏹ 停止
          </button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 摄像头输入 -->
    <div>
      <div class="section-title">📷 摄像头</div>
      <div class="input-group">
        <div class="input-row">
          <input type="number" id="camera-id" placeholder="摄像头 ID" value="0" min="0" style="width:80px;">
          <input type="number" id="camera-fps" placeholder="目标帧率" value="30" min="1" max="60" style="width:80px;">
          <button class="btn btn-primary" id="btn-start-camera" disabled>
            📷 启动
          </button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 处理进度 -->
    <div id="progress-container">
      <div class="section-title">⏳ 处理进度</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div id="progress-text">等待开始...</div>
    </div>

    <!-- 统计信息 -->
    <div>
      <div class="section-title">📊 统计</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">已接收帧数</div>
          <div class="stat-value" id="stat-frames">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">处理 FPS</div>
          <div class="stat-value" id="stat-fps">--</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">当前帧</div>
          <div class="stat-value" id="stat-current">--</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">数据源</div>
          <div class="stat-value" id="stat-source">--</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 控制按钮 -->
    <div>
      <div class="section-title">🎮 控制</div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="btn-reset-pose">
          🔄 重置姿态
        </button>
        <button class="btn btn-secondary" id="btn-reconnect">
          🔌 重连
        </button>
      </div>
    </div>

    <!-- 日志 -->
    <div>
      <div class="section-title">📋 日志</div>
      <div id="log-area"></div>
    </div>

    <!-- 快捷链接 -->
    <div class="quick-links">
      <a href="/" class="quick-link">💬 聊天模式</a>
      <a href="/motion.html" class="quick-link">🎭 动作捕捉</a>
    </div>
  </div>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">正在加载模型...</div>
  <div id="loading-progress"></div>
</div>

<div id="error-box"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="js/motion-main.js"></script>

</body>
</html>
